name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend (typecheck + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run lint
      - run: npm test
      - run: npm run build

  worker:
    name: Cloudflare Worker (dry-run build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare-sync
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cloudflare-sync/package-lock.json
      - run: npm ci
      # dry-run 只做本地打包(esbuild),不需要 Cloudflare 凭据
      - run: npx wrangler deploy --dry-run --outdir /tmp/worker-build
