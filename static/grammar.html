<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>日语语法练习</title>
    <link rel="stylesheet" href="styles.css?v=20260609-meaning-editor-modal">
    <link rel="stylesheet" href="grammar.css?v=20260610-grammar-mvp">
  </head>
  <body>
    <main class="app-shell grammar-shell">
      <div class="top-controls">
        <a class="grammar-home-link" href="http://127.0.0.1:8000/">返回背单词</a>
        <div class="daily-progress" aria-label="语法学习进度">
          <span id="progressText">0/0</span>
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>
      </div>

      <section class="card review-card grammar-card" id="card">
        <div class="meaning-panel grammar-prompt" id="promptPanel">
          <p id="prompt">加载中...</p>
        </div>

        <div class="answer-panel hidden" id="answerPanel">
          <div class="word-main">
            <p class="kana grammar-pattern" id="pattern"></p>
            <p class="kanji grammar-meaning" id="meaning"></p>
            <p class="pos" id="level"></p>
          </div>

          <div class="forms grammar-forms" id="details"></div>

          <div class="example-box grammar-example" id="exampleBox">
            <p id="exampleJp"></p>
            <p id="exampleMeaning"></p>
          </div>

          <div class="fold-box hidden" id="confusionBox">
            <button class="ghost-eye fold-toggle" id="confusionToggle" type="button" aria-label="显示易混淆">◉</button>
            <div class="confusions hidden" id="confusions"></div>
          </div>
        </div>

        <div class="actions hidden" id="actions">
          <button class="forgot" data-answer="forgot">忘记</button>
          <button class="fuzzy" data-answer="fuzzy">模糊</button>
          <button class="know" data-answer="know">认识</button>
          <button class="known" data-answer="known_forever">熟知</button>
        </div>
      </section>

      <section class="finish-panel grammar-finish hidden" id="finishPanel">
        <p class="finish-kicker">日语语法练习</p>
        <h1>语法任务完成</h1>
        <div class="finish-stats">
          <div><span>今日见过</span><strong id="reviewedToday">0</strong></div>
          <div><span>今日掌握</span><strong id="masteredToday">0</strong></div>
          <div><span>待复习</span><strong id="lowCount">0</strong></div>
          <div><span>未学语法</span><strong id="unseenCount">0</strong></div>
          <div><span>永久熟知</span><strong id="knownForever">0</strong></div>
        </div>
        <a class="word-table-button grammar-finish-link" href="http://127.0.0.1:8000/">返回背单词</a>
        <button class="continue-button" id="reloadButton" type="button">再看一遍</button>
      </section>
    </main>

    <script src="grammar.js?v=20260610-grammar-mvp"></script>
  </body>
</html>
